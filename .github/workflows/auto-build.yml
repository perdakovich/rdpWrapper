name: Auto Build

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      create_release:
        description: Create a draft GitHub release
        type: boolean
        default: true

jobs:
  build:
    runs-on: windows-2022
    permissions:
      actions: write
      contents: write
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - uses: microsoft/setup-msbuild@v1.1

      - name: Detect signing configuration
        id: signing
        shell: bash
        run: echo "enabled=${{ secrets.SIGNPATH_API_TOKEN != '' && vars.SIGNPATH_ORGANIZATION_ID != '' && vars.SIGNPATH_PROJECT_SLUG != '' && vars.SIGNPATH_SIGNING_POLICY_SLUG != '' }}" >> "$GITHUB_OUTPUT"

      - name: Restore and Build
        shell: pwsh
        run: |
          $platforms = "Any CPU", "x64", "x86"
          $configs = "Release", "ReleaseLite"
          foreach ($p in $platforms) {
            foreach ($c in $configs) {
              msbuild rdpWrapper.sln -restore /t:Rebuild /m /p:Configuration=$c /p:Platform="$p" /p:DebugType=None /p:RestoreLockedMode=true
            }
          }

      - name: Upload for signing
        if: steps.signing.outputs.enabled == 'true'
        id: upload-unsigned-artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned
          path: rdpWrapper/bin/*.exe

      - name: Request signing
        if: steps.signing.outputs.enabled == 'true'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: '${{ steps.upload-unsigned-artifact.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: 'rdpWrapper/bin/signed'

      - name: Package release files
        id: pkg
        shell: powershell
        env:
          SRC: ${{ steps.signing.outputs.enabled == 'true' && 'rdpWrapper/bin/signed' || 'rdpWrapper/bin' }}
        run: |
          $dest = "release"
          New-Item -ItemType Directory -Force $dest | Out-Null

          Get-ChildItem -Path $env:SRC -Filter *.exe | ForEach-Object {
              Copy-Item $_.FullName -Destination "$dest/$($_.Name)"
              Compress-Archive -Path $_.FullName -DestinationPath "$dest/$($_.BaseName).zip" -Force
          }

          $v = (Get-Item "$dest/rdpWrapper.exe").VersionInfo.FileVersion
          echo "version=$($v.Split('.')[0..2] -join '.')" >> $env:GITHUB_OUTPUT

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rdpwrapper-${{ steps.pkg.outputs.version }}-${{ steps.signing.outputs.enabled == 'true' && 'signed' || 'unsigned' }}
          path: release/*

      - name: Create draft Release
        if: github.event_name == 'workflow_dispatch' && inputs.create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pkg.outputs.version }}
          name: ${{ steps.pkg.outputs.version }}${{ steps.signing.outputs.enabled == 'true' && '' || ' (unsigned)' }}
          draft: true
          body: "_Draft build generated via workflow dispatch${{ steps.signing.outputs.enabled != 'true' && ' (unsigned)' || '' }}_"
          files: release/*

      - name: Cleanup artifacts
        if: steps.signing.outputs.enabled == 'true'
        uses: geekyeggo/delete-artifact@v5
        with:
          name: unsigned
